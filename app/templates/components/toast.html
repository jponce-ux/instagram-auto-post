{# Toast notification component - hidden by default #}
{# Usage: Add data-toast="error|success|warning" and data-toast-message="text" to trigger #}

<div id="toast-container" class="fixed bottom-4 right-4 z-50 flex flex-col gap-2 pointer-events-none">
    <div id="toast" 
         class="hidden pointer-events-auto max-w-sm w-full bg-white rounded-lg shadow-lg border-l-4 p-4 transform translate-x-full transition-transform duration-300 ease-out"
         data-toast-type="">
        <div class="flex items-start">
            <div class="flex-shrink-0">
                <svg id="toast-icon-error" class="hidden w-5 h-5 text-red-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                </svg>
                <svg id="toast-icon-success" class="hidden w-5 h-5 text-green-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                </svg>
                <svg id="toast-icon-warning" class="hidden w-5 h-5 text-yellow-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path>
                </svg>
            </div>
            <div class="ml-3 flex-1">
                <p id="toast-message" class="text-sm text-gray-700"></p>
            </div>
            <div class="ml-4 flex-shrink-0">
                <button onclick="hideToast()" class="inline-flex text-gray-400 hover:text-gray-600">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                    </svg>
                </button>
            </div>
        </div>
    </div>
</div>

<script>
function showToast(type, message) {
    const toast = document.getElementById('toast');
    const toastMessage = document.getElementById('toast-message');
    const toastContainer = document.getElementById('toast-container');
    
    // Hide all icons first
    document.getElementById('toast-icon-error').classList.add('hidden');
    document.getElementById('toast-icon-success').classList.add('hidden');
    document.getElementById('toast-icon-warning').classList.add('hidden');
    
    // Remove previous type classes
    toast.classList.remove('border-red-400', 'border-green-400', 'border-yellow-400');
    
    // Set type-specific styling
    if (type === 'error') {
        toast.classList.add('border-red-400');
        document.getElementById('toast-icon-error').classList.remove('hidden');
    } else if (type === 'success') {
        toast.classList.add('border-green-400');
        document.getElementById('toast-icon-success').classList.remove('hidden');
    } else if (type === 'warning') {
        toast.classList.add('border-yellow-400');
        document.getElementById('toast-icon-warning').classList.remove('hidden');
    }
    
    toastMessage.textContent = message;
    toast.dataset.toastType = type;
    
    // Show toast
    toast.classList.remove('hidden');
    toastContainer.classList.remove('translate-x-full');
    
    // Auto-hide after 5 seconds
    setTimeout(hideToast, 5000);
}

function hideToast() {
    const toast = document.getElementById('toast');
    const toastContainer = document.getElementById('toast-container');
    
    toast.classList.add('hidden');
    toastContainer.classList.add('translate-x-full');
}
</script>
