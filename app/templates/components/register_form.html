{# HTMX register form partial #}
<div id="auth-form-box">
    <form hx-post="/auth/register" hx-target="#auth-form-box" hx-swap="innerHTML" method="post" class="space-y-4">
        <div>
            <label for="username" class="block text-sm font-medium text-gray-700">Nombre de usuario</label>
            <input type="text" id="username" name="username" required
                   class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 sm:text-sm"
                   placeholder="miusuario">
        </div>
        <div>
            <label for="email" class="block text-sm font-medium text-gray-700">Correo electrónico</label>
            <input type="email" id="email" name="email" required
                   class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 sm:text-sm"
                   placeholder="tu@email.com">
        </div>
        <div>
            <label for="password" class="block text-sm font-medium text-gray-700">Contraseña</label>
            <input type="password" id="password" name="password" required minlength="6"
                   class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 sm:text-sm"
                   placeholder="••••••••">
        </div>
        <div>
            <label for="confirm_password" class="block text-sm font-medium text-gray-700">Confirmar contraseña</label>
            <input type="password" id="confirm_password" name="confirm_password" required minlength="6"
                   class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 sm:text-sm"
                   placeholder="••••••••">
        </div>
        <div>
            <button type="submit"
                    class="w-full flex justify-center py-2 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500">
                Crear Cuenta
            </button>
        </div>
    </form>
    <div class="mt-4 text-center text-sm text-gray-600">
        Ya tengo cuenta. <a href="#" hx-get="/auth/login-form" hx-target="#auth-form-box" hx-swap="innerHTML" class="text-blue-600 hover:text-blue-800 font-medium">Iniciar sesión</a>
    </div>
</div>
