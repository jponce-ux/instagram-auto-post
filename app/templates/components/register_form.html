{# Register form partial #}
<div id="auth-form-box">
    <form id="register-form" method="post" class="space-y-4" onsubmit="return handleRegisterSubmit(event)">
        <div id="register-error" class="hidden bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded-lg mb-4"></div>
        <div>
            <label for="register-email" class="block text-sm font-medium text-gray-700">Correo electronico</label>
            <input type="email" id="register-email" name="email" required
                   class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 sm:text-sm"
                   placeholder="tu@email.com"
                   oninput="validateRegisterForm()">
        </div>
        <div>
            <label for="register-password" class="block text-sm font-medium text-gray-700">Contrasena</label>
            <input type="password" id="register-password" name="password" required minlength="6"
                   class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 sm:text-sm"
                   placeholder="Minimo 6 caracteres"
                   oninput="validateRegisterForm()">
        </div>
        <div>
            <label for="register-confirm" class="block text-sm font-medium text-gray-700">Confirmar contrasena</label>
            <input type="password" id="register-confirm" name="confirm_password" required minlength="6"
                   class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 sm:text-sm"
                   placeholder="Repite la contrasena"
                   oninput="validateRegisterForm()">
            <p id="register-confirm-error" class="hidden mt-1 text-sm text-red-600">Las contrasenas no coinciden</p>
        </div>
        <div>
            <button type="submit" id="register-submit" disabled
                    class="w-full flex justify-center py-2 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 disabled:opacity-50 disabled:cursor-not-allowed">
                Crear Cuenta
            </button>
        </div>
    </form>
    <div class="mt-4 text-center text-sm text-gray-600">
        Ya tengo cuenta. <a href="#" onclick="showLoginForm(); return false;" class="text-blue-600 hover:text-blue-800 font-medium cursor-pointer">Iniciar sesion</a>
    </div>
</div>

<script>
function validateRegisterForm() {
    const email = document.getElementById('register-email');
    const password = document.getElementById('register-password');
    const confirm = document.getElementById('register-confirm');
    const confirmError = document.getElementById('register-confirm-error');
    const submitBtn = document.getElementById('register-submit');
    
    const emailValid = email.checkValidity();
    const passwordValid = password.value.length >= 6;
    const confirmValid = confirm.value.length >= 6 && confirm.value === password.value;
    
    // Show/hide confirm error
    if (confirm.value.length > 0 && confirm.value !== password.value) {
        confirmError.classList.remove('hidden');
        confirm.classList.add('border-red-500');
    } else {
        confirmError.classList.add('hidden');
        confirm.classList.remove('border-red-500');
    }
    
    // Enable/disable submit
    if (emailValid && passwordValid && confirmValid) {
        submitBtn.disabled = false;
    } else {
        submitBtn.disabled = true;
    }
}

async function handleRegisterSubmit(event) {
    event.preventDefault();
    
    const form = document.getElementById('register-form');
    const submitBtn = document.getElementById('register-submit');
    const errorDiv = document.getElementById('register-error');
    const formData = new FormData(form);
    
    errorDiv.classList.add('hidden');
    
    submitBtn.disabled = true;
    submitBtn.textContent = 'Creando cuenta...';
    
    try {
        const response = await fetch('/auth/register', {
            method: 'POST',
            body: formData,
            headers: {
                'HX-Request': 'true'
            }
        });
        
        if (response.ok) {
            showToast('success', 'Cuenta creada. Ahora puedes iniciar sesion.');
            setTimeout(() => {
                window.location.href = '/auth/login';
            }, 1500);
        } else {
            const json = await response.json();
            errorDiv.textContent = json.error || 'Error en el registro';
            errorDiv.classList.remove('hidden');
            submitBtn.disabled = false;
            submitBtn.textContent = 'Crear Cuenta';
        }
    } catch (error) {
        showToast('error', 'Error de conexion');
        submitBtn.disabled = false;
        submitBtn.textContent = 'Crear Cuenta';
    }
    
    return false;
}

// Initialize form validation on load
document.addEventListener('DOMContentLoaded', validateRegisterForm);
</script>
