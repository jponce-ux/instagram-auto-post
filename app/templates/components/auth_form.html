{# Login form partial #}
<div id="auth-form-box">
    <form id="login-form" method="post" class="space-y-4" onsubmit="return handleLoginSubmit(event)">
        <div id="login-error" class="hidden bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded-lg mb-4"></div>
        <div>
            <label for="email" class="block text-sm font-medium text-gray-700">Correo electronico</label>
            <input type="email" id="email" name="username" required
                   class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 sm:text-sm"
                   placeholder="tu@email.com">
        </div>
        <div>
            <label for="password" class="block text-sm font-medium text-gray-700">Contrasena</label>
            <input type="password" id="password" name="password" required
                   class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 sm:text-sm"
                   placeholder="••••••••">
        </div>
        <div>
            <button type="submit" id="login-submit"
                    class="w-full flex justify-center py-2 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500">
                Iniciar Sesion
            </button>
        </div>
    </form>
    <div class="mt-4 text-center text-sm text-gray-600">
        No tienes cuenta? <a href="#" onclick="showRegisterForm(); return false;" class="text-blue-600 hover:text-blue-800 font-medium cursor-pointer">Registrate</a>
    </div>
</div>

<script>
async function handleLoginSubmit(event) {
    event.preventDefault();
    
    const form = document.getElementById('login-form');
    const submitBtn = document.getElementById('login-submit');
    const errorDiv = document.getElementById('login-error');
    const formData = new FormData(form);
    
    errorDiv.classList.add('hidden');
    
    submitBtn.disabled = true;
    submitBtn.textContent = 'Cargando...';
    
    try {
        const response = await fetch('/auth/login', {
            method: 'POST',
            body: formData,
            headers: {
                'HX-Request': 'true'
            }
        });
        
        if (response.ok) {
            const json = await response.json();
            
            if (json.access_token) {
                localStorage.setItem('access_token', json.access_token);
                localStorage.setItem('user', JSON.stringify(json.user));
            }
            
            const redirectUrl = response.headers.get('HX-Redirect') || response.headers.get('hx-redirect');
            if (redirectUrl) {
                window.location.href = redirectUrl;
            }
        } else {
            const json = await response.json();
            errorDiv.textContent = json.error || 'Error de autenticacion';
            errorDiv.classList.remove('hidden');
            submitBtn.disabled = false;
            submitBtn.textContent = 'Iniciar Sesion';
        }
    } catch (error) {
        errorDiv.textContent = 'Error de conexion';
        errorDiv.classList.remove('hidden');
        submitBtn.disabled = false;
        submitBtn.textContent = 'Iniciar Sesion';
    }
    
    return false;
}
</script>
