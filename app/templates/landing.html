{% extends "base.html" %}

{% block title %}Bienvenido - Mi App Instagram{% endblock %}

{% block content %}
<div class="min-h-[80vh] flex items-center justify-center px-4">
    <div class="max-w-2xl w-full text-center">
        <h1 class="text-5xl font-extrabold text-gray-900 mb-6">
            Gestiona tu Instagram desde un solo lugar
        </h1>
        <p class="text-xl text-gray-600 mb-8">
            Publica contenido, programa posts y analiza el rendimiento de tu cuenta.
        </p>
        <div class="flex flex-col sm:flex-row gap-4 justify-center">
            <a href="/auth/login" class="inline-flex items-center justify-center px-8 py-3 text-lg font-medium text-white bg-blue-600 hover:bg-blue-700 rounded-lg transition-colors">
                Iniciar Sesión
            </a>
            <a href="/auth/register" class="inline-flex items-center justify-center px-8 py-3 text-lg font-medium text-blue-600 bg-white hover:bg-gray-50 border-2 border-blue-600 rounded-lg transition-colors">
                Crear Cuenta
            </a>
        </div>
    </div>
</div>
{% endblock %}
